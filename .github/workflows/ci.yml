name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff cryptography pytest
          pip install -e .

      - name: Lint with ruff
        run: ruff check .

      - name: Test host
        run: python -m pytest tests/ -v

      - name: Test firmware modules
        working-directory: firmware
        run: python -m pytest tests/ -v
